<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <title>📘 MAQTEC API Docs</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png" />

    <!-- Swagger UI -->
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />

    <style>
      body {
        margin: 0;
        background-color: #0f1115;
        font-family: "Inter", sans-serif;
      }

      .swagger-ui {
        background-color: #0f1115;
        color: #e2e2e2;
      }

      .swagger-ui .topbar {
        background: #1a1d23;
        border-bottom: 2px solid #ff7b00;
        padding: 10px 20px;
      }

      .topbar-wrapper img {
        content: url("/static/img/logo_maqtec.png");
        width: 140px;
      }

      .swagger-ui .info {
        background: #14171d;
        border-radius: 10px;
        padding: 20px;
      }

      .swagger-ui .opblock {
        background: #191c22;
        border: 1px solid #2a2d35;
        border-radius: 8px;
      }

      .swagger-ui .opblock-summary {
        background: #22252b !important;
        border-radius: 8px;
      }

      .swagger-ui .opblock-summary-method {
        border-radius: 6px;
        font-weight: 600;
      }

      .swagger-ui .opblock-summary-method.GET {
        background: #2d9cdb;
      }
      .swagger-ui .opblock-summary-method.POST {
        background: #27ae60;
      }
      .swagger-ui .opblock-summary-method.PUT {
        background: #f2994a;
      }
      .swagger-ui .opblock-summary-method.DELETE {
        background: #eb5757;
      }

      .swagger-ui .btn.authorize {
        background-color: #ff7b00 !important;
        border-color: #ff7b00 !important;
        color: #fff !important;
      }

      .swagger-ui .model-title,
      .swagger-ui .parameter__name {
        color: #ff7b00;
      }

      .swagger-ui pre {
        background: #101215 !important;
        border-radius: 8px;
        color: #e0e0e0;
      }

      .swagger-ui .responses-inner {
        background: #14171d !important;
      }

      .swagger-ui .response-col_status {
        color: #27ae60;
      }
    </style>
  </head>

  <body>
    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-standalone-preset.js"></script>
    <script>
      window.onload = function() {
        const ui = SwaggerUIBundle({
          url: "/swagger.json", // ⚙️ Asegúrate que DRF-YASG sirva aquí
          dom_id: "#swagger-ui",
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: "BaseLayout",
          deepLinking: true,
          docExpansion: "none",
          persistAuthorization: true,
          syntaxHighlight: { theme: "monokai" },
        });
        window.ui = ui;
      };
    </script>
  </body>
</html>
